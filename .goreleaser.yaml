#
# Release build for the guest-side mount binary. One static build
# (CGO_ENABLED=0 — mount2/go-fuse is pure Go, no libfuse), reproducible
# (trimpath + mod_timestamp), for linux amd64+arm64, with a checksums file and
# a per-artifact SBOM. The GitHub Release is published on a v* tag. The release
# is gated behind the e2e job in the release workflow; goreleaser itself only
# builds and publishes the artifacts.

version: 2

project_name: ocu-rclone-filestore

builds:
  - id: ocu-rclone-filestore
    main: ./cmd/ocu-rclone-filestore
    binary: ocu-rclone-filestore
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    # Reproducible builds: stamp the binary's mtime from the commit, not the
    # build clock, and strip debug info.
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: ocu-rclone-filestore
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archive-sbom
    artifacts: archive
    # Pin the SBOM output name explicitly rather than inheriting goreleaser's
    # default template. The release workflow signs SBOMs by globbing
    # dist/*.sbom.json; making the name a value this file owns keeps that
    # contract from silently breaking if an upstream default ever changes the
    # extension (which, with nullglob in the sign step, would skip SBOM signing
    # with no error). This matches the current default, so behaviour is unchanged.
    documents:
      - "{{ .ArtifactName }}.sbom.json"

release:
  github:
    owner: Wide-Moat
    name: ocu-rclone-filestore
  # Create the release as a DRAFT: goreleaser uploads the archives, checksums,
  # and SBOMs but does not make the release public. The release workflow flips
  # it to published only after keyless signing and SLSA provenance succeed, so
  # a signing/attestation failure leaves the release unpublished rather than
  # public-and-unsigned (fail-closed supply-chain guarantee).
  draft: true
  prerelease: auto

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
