# Conventional-commit ruleset enforced over pull-request commits by
# .github/workflows/conventional-commits.yml.

extends:
  - "@commitlint/config-conventional"

rules:
  # Allow the commit types this repository uses.
  type-enum:
    - 2
    - always
    - - build
      - chore
      - ci
      - docs
      - feat
      - fix
      - perf
      - refactor
      - revert
      - style
      - test
  # Subject must not be empty and must not end with a period.
  subject-empty:
    - 2
    - never
  subject-full-stop:
    - 2
    - never
    - "."
  # Do not constrain subject case. config-conventional defaults to forbidding a
  # sentence/start/pascal/upper-case subject, which rejects bot-authored commits
  # like "ci(deps): Bump actions/checkout ..." (Dependabot capitalizes the
  # verb). The type/scope/structure rules above are what matter; the leading
  # letter's case is cosmetic, so disable that check rather than rewrite every
  # automated commit.
  subject-case:
    - 0
  # Do not constrain body line length. config-conventional defaults to 100
  # chars, which rejects bot-authored commits whose body is auto-generated
  # release notes — Dependabot embeds long changelog URLs and bullet lines that
  # exceed 100 and cannot be reflowed. The HEADER length is still capped below;
  # the body is informational, so disable the body line cap rather than reject
  # every dependency-update commit.
  body-max-line-length:
    - 0
  # Keep the header readable.
  header-max-length:
    - 2
    - always
    - 100
