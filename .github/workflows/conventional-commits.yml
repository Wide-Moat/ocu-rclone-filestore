#
# Conventional-commits gate. Runs commitlint over every commit in the pull
# request using the ruleset in .commitlintrc.yml.

name: conventional-commits

on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    name: commitlint (PR commits)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the PR range)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install commitlint
        run: npm install --no-save @commitlint/cli@19.6.1 @commitlint/config-conventional@19.6.0
      - name: Lint PR commits
        run: |
          npx commitlint \
            --config .commitlintrc.yml \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose
