#
# Secrets scan over the full history. Any finding from gitleaks or trufflehog
# fails the job. fetch-depth: 0 pulls the complete history so historic leaks
# are caught, not only the diff.

name: secrets

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        # Run the gitleaks CLI directly (pinned by image digest) rather than the
        # action wrapper, which demands a paid license for organization repos.
        # `detect` scans the full git history; a non-zero exit on any finding
        # keeps this gate blocking.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks@sha256:b109bc5f8f76a38196a3e413704fc5b9e3c32360bce4e4b603bd6f45b3721dbb \
            detect --source=/repo --redact --verbose --exit-code=1

  trufflehog:
    name: trufflehog (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run trufflehog
        # Run the trufflehog CLI directly (pinned by image digest). Scanning the
        # checked-out git history (`git file:///repo`) is deterministic and does
        # not depend on the action's event-payload commit-range computation,
        # which fails on some push events. `--fail` makes any verified/unknown
        # result exit non-zero, keeping this gate blocking.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/trufflesecurity/trufflehog@sha256:ce57a0504050b247c378e66ff5fa08f7ea97ee375d5a5e30a4ae0281566a987f \
            git file:///repo --results=verified,unknown --fail
