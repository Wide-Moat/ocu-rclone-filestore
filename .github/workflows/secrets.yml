#
# Secrets scan over the full history. Any finding from gitleaks or trufflehog
# fails the job. fetch-depth: 0 pulls the complete history so historic leaks
# are caught, not only the diff.

name: secrets

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  trufflehog:
    name: trufflehog (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@d65a4dde42f8a2b2c0d2b7f7c79ede324848f234 # v3.90.8
        with:
          extra_args: --results=verified,unknown
