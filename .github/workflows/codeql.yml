#
# CodeQL static analysis. Runs on push to main and on a weekly schedule, then
# uploads SARIF results to the repository's code scanning dashboard (Security
# tab) for human triage. A matrix over the analyzed languages keeps the Go
# module and the workflow definitions on independent, parallel jobs. This
# workflow is additive to sast.yml (semgrep) and is fully separate from the
# build, release, and live e2e paths.
#
# CodeQL is advisory defense-in-depth, NOT a merge gate: the required, blocking
# SAST floor is semgrep (sast.yml, a required status check). CodeQL runs on the
# pushed main branch and weekly, so its findings still reach code scanning
# alerts, but it deliberately carries NO pull_request trigger — a per-PR CodeQL
# check would render a green tick that masquerades as a gate while not being a
# required, blocking one. Keeping it off the PR event removes that misleading
# signal without losing the dashboard coverage.

name: codeql

on:
  # No pull_request trigger: CodeQL is advisory defense-in-depth, not a merge
  # gate (semgrep in sast.yml is the required blocking SAST floor). Running only
  # on pushed main + weekly keeps the dashboard current without a per-PR check
  # that masquerades as a gate while not being a required, blocking one.
  push:
    branches: [main]
  schedule:
    # Weekly run so the code scanning baseline stays current independent of PR
    # traffic (Mondays 07:13 UTC; off-the-hour to avoid scheduler contention).
    - cron: "13 7 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required to upload the SARIF results to the code scanning dashboard.
      security-events: write
      # Required by the CodeQL action to read the workflow run context.
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pure-Go module: it cross-compiles with CGO_ENABLED=0, so autobuild
          # (a plain `go build`) is the simplest build-mode that produces the
          # database CodeQL needs. No manual build steps are required. The Go
          # job runs the security-extended query suite (the default suite plus
          # lower-precision security queries) for deeper coverage of the only
          # hand-written code in the tree.
          - language: go
            build-mode: autobuild
            queries: security-extended
          # The repository carries many GitHub Actions workflows; the actions
          # language analyzes those workflow definitions themselves. It needs no
          # compilation, so it runs in build-mode none. The actions packs ship
          # no security-extended suite, so this job stays on the default queries.
          - language: actions
            build-mode: none
            queries: ""
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Empty for the actions job (keeps the default suite); set to
          # security-extended for Go. An empty value is the action's default.
          queries: ${{ matrix.queries }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
