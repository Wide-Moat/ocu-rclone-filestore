#
# Tag-triggered release. A tag push (v*) runs the e2e gate first; the publish
# job runs only when the gate is green (needs: [e2e]) — a red or absent e2e
# structurally blocks the release (SC3). goreleaser runs via its official image
# pinned by digest, the same tool-image pattern the CI scanners use, and emits
# the SBOM through its built-in syft integration inside that image.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # The e2e gate. In wave 05-01 this is the PLACEHOLDER body: it builds the
  # gated e2e runner and runs it with the live gate UNSET, so it skips clean and
  # the job is green. The gate's STRUCTURE (this job, and the publish job's
  # needs: on it) is the SC3 release gate and is complete now.
  #
  # >>> 05-02 REPLACES THE BODY OF THIS JOB <<< with the live broker exercise
  #     (compose up with /dev/fuse + SYS_ADMIN, RCLONE_OCUFS_LIVE set, the real
  #     broker endpoint exported) on a host that provides /dev/fuse (a
  #     self-hosted runner or a Lima host — see docs/ci-fuse-decision.md). It
  #     MUST keep this job's name (e2e) and the publish job's needs: [e2e]
  #     unchanged, and MUST NOT add continue-on-error or any manual bypass: a
  #     red e2e must block publish.
  e2e:
    name: e2e gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build the gated e2e runner
        run: go build -tags e2e ./test/e2e/
      # 05-01 placeholder: run with the live gate unset so the runner skips
      # clean and the gate is green. 05-02 sets RCLONE_OCUFS_LIVE and the
      # mountpoint/socket env against the live broker harness here.
      - name: Run e2e (placeholder — skips clean until 05-02 wires the live broker)
        run: go test -tags e2e ./test/e2e/ -run TestE2EExercise -count=1

  # Publish runs ONLY after the e2e gate is green. THE GATING EDGE (SC3).
  publish:
    name: publish release
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # goreleaser via its official image pinned by digest (goreleaser:v2.16.0,
      # bundles Go 1.26 and syft). The release token is passed through so the
      # GitHub Release is created on the tag.
      - name: goreleaser release
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/repo -w /repo \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            goreleaser/goreleaser@sha256:f5ce92e9a38fb9406ccd638b95e43402cd3f4c567cb677eb06af9fd161278c12 \
            release --clean
