#
# Tag-triggered release. A tag push (v*) runs the e2e gate first; the publish
# job runs only when the gate is green (needs: [e2e]) — a red or absent e2e
# structurally blocks the release (SC3). goreleaser runs via its official image
# pinned by digest, the same tool-image pattern the CI scanners use, and emits
# the SBOM through its built-in syft integration inside that image.

name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # The e2e gate — LIVE since wave 05-02: the compose harness brings up the
  # real brokers (clone-at-ref, pinned BROKER_REF) and the mount with
  # /dev/fuse + SYS_ADMIN, and the test-runner service drives the full gated
  # exercise with RCLONE_OCUFS_LIVE set. The job fails hard when the runner
  # host does not provide /dev/fuse (probe below): the gate then runs on a
  # self-hosted runner or a Lima host instead (docs/ci-fuse-decision.md).
  # NO continue-on-error and NO manual bypass anywhere in this job: a red e2e
  # must block publish (SC3 / WARNING-A).
  #
  # Fail-closed by design: OCU_E2E_THROTTLE_FILE / OCU_E2E_ALLOW_PARTIAL are
  # deliberately NOT set here. Until the broker's throttle affordance is
  # available and wired, the SC2 throttle step FAILS this job and therefore
  # blocks the release — a release must never publish with that assertion
  # silently skipped.
  e2e:
    name: e2e gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      # Hard probe, not a skip: a host without the FUSE device cannot run the
      # live gate, and the gate must never be green without having run.
      - name: Require /dev/fuse on this runner
        run: |
          if [ ! -e /dev/fuse ]; then
            echo "::error::/dev/fuse is absent on this runner. The live e2e gate must run on a host that provides it (self-hosted runner or Lima — see docs/ci-fuse-decision.md). This job fails hard by design; there is no bypass on the release path."
            exit 1
          fi
          echo "/dev/fuse present"
      # The mount destinations are a host bind with rshared propagation (see
      # deploy/compose/docker-compose.yml); the subdirectories must exist
      # before the harness starts.
      - name: Prepare the workspace bind
        run: mkdir -p /tmp/ocu-e2e-workspace/out /tmp/ocu-e2e-workspace/in
      - name: Bring up the harness (real brokers + mount)
        run: docker compose -f deploy/compose/docker-compose.yml up --build -d broker-rw broker-ro mount
      - name: Run the live exercise (test-runner service)
        run: docker compose -f deploy/compose/docker-compose.yml run --rm --build test-runner
      - name: Harness logs on failure
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs
      - name: Teardown
        if: always()
        run: docker compose -f deploy/compose/docker-compose.yml down -v

  # Publish runs ONLY after the e2e gate is green. THE GATING EDGE (SC3).
  publish:
    name: publish release
    needs: [e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      # goreleaser via its official image pinned by digest (goreleaser:v2.16.0,
      # bundles Go 1.26 and syft). The release token is passed through so the
      # GitHub Release is created on the tag.
      - name: goreleaser release
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/repo -w /repo \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            goreleaser/goreleaser@sha256:f5ce92e9a38fb9406ccd638b95e43402cd3f4c567cb677eb06af9fd161278c12 \
            release --clean
