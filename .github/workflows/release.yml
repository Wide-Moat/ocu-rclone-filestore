#
# Tag-triggered release. A tag push (v*) runs the e2e gate first; the publish
# job runs only when the gate is green (needs: [e2e]) — a red or absent e2e
# structurally blocks the release (SC3). goreleaser runs via its official image
# pinned by digest, the same tool-image pattern the CI scanners use, and emits
# the SBOM through its built-in syft integration inside that image. Keyless
# Sigstore signing and SLSA build provenance run as native runner steps AFTER
# goreleaser exits: goreleaser runs inside a docker-run container with no OIDC
# environment, so Fulcio-bound steps must execute on the runner where GitHub
# injects the OIDC token (granted by id-token: write on the publish job only).

name: release

on:
  push:
    tags:
      - 'v*'

# Least-privilege default for every job. The publish job raises its own scopes.
permissions:
  contents: read

jobs:
  # The e2e gate — LIVE: the compose harness brings up the network-topology
  # graph (the harness peers + the live edge) and the mount with /dev/fuse +
  # SYS_ADMIN, and the test-runner service drives the full gated exercise with
  # RCLONE_OCUFS_LIVE set, including the Envoy-only-hop assertion. The job fails
  # hard when the runner host does not provide /dev/fuse (probe below): the gate
  # then runs on a self-hosted runner or a Lima host instead
  # (docs/ci-fuse-decision.md). NO continue-on-error and NO manual bypass
  # anywhere in this job: a red e2e must block publish (SC3 / WARNING-A).
  #
  # Fail-closed by design: OCU_E2E_ALLOW_PARTIAL is deliberately NOT set here,
  # so every data-path proof — broker-side persistence, the cold read through a
  # second fresh mount, and the SC2 throttle retry-no-loss — must run and pass.
  # The filestore drives the SC2 throttle via its per-op token bucket on the
  # throttle scope (no guest simulation); a missing or skipped assertion fails
  # this job, so a release can never publish with a data-path proof silently
  # skipped.
  e2e:
    name: e2e gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Hard probe, not a skip: a host without the FUSE device cannot run the
      # live gate, and the gate must never be green without having run.
      - name: Require /dev/fuse on this runner
        run: |
          set -euo pipefail
          if [ ! -e /dev/fuse ]; then
            echo "::error::/dev/fuse is absent on this runner. The live e2e gate must run on a host that provides it (self-hosted runner or Lima — see docs/ci-fuse-decision.md). This job fails hard by design; there is no bypass on the release path."
            exit 1
          fi
          echo "/dev/fuse present"
      # The mount destinations are a host bind at the canonical /mnt/user-data
      # mount root with rshared propagation (see
      # deploy/compose/docker-compose.yml); every destination subdirectory must
      # exist before the harness starts (the mount binary does not create them).
      # outputs = rw scope, uploads = ro scope, outputs2 = the cold-read second
      # mount of the rw scope, throttle = the SC2 throttle scope.
      - name: Prepare the mount-root bind
        run: mkdir -p /tmp/ocu-e2e-mountroot/outputs /tmp/ocu-e2e-mountroot/uploads /tmp/ocu-e2e-mountroot/outputs2 /tmp/ocu-e2e-mountroot/throttle
      - name: Bring up the harness (peers + edge + mount)
        run: docker compose -f deploy/compose/docker-compose.yml up --build -d harness-init control-plane exchange filestore edge mount
      - name: Run the live exercise (test-runner service)
        run: docker compose -f deploy/compose/docker-compose.yml run --rm --build test-runner
      - name: Run the backend conformance round-trip (conformance-runner service)
        run: docker compose -f deploy/compose/docker-compose.yml run --rm --build conformance-runner
      - name: Harness logs on failure
        if: failure()
        run: docker compose -f deploy/compose/docker-compose.yml logs
      - name: Teardown
        if: always()
        run: docker compose -f deploy/compose/docker-compose.yml down -v

  # Publish runs ONLY after the e2e gate is green. THE GATING EDGE (SC3).
  publish:
    name: publish release
    needs: [e2e]
    runs-on: ubuntu-latest
    # Minimal scopes, granted to THIS job only and only because it runs after
    # the gate:
    #   contents: write     — goreleaser creates the Release + uploads assets;
    #                         the native step attaches .sig/.pem sidecars.
    #   id-token: write     — mints the workflow OIDC token used by keyless
    #                         cosign (Fulcio/Rekor) and attest-build-provenance.
    #   attestations: write — lets attest-build-provenance write the SLSA
    #                         provenance to the repo attestation store.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      # goreleaser via its official image pinned by digest (goreleaser:v2.16.0,
      # bundles Go 1.26 and syft). The release token is passed through so the
      # GitHub Release is created on the tag. The -v bind mount makes the dist/
      # artifacts visible on the runner workspace after the container exits, so
      # the native signing/provenance steps below operate on them directly.
      # UNCHANGED from the gated build: no OIDC env enters this container.
      # The release is created as a DRAFT (.goreleaser.yaml release.draft: true):
      # assets are uploaded but the release is not public until the final step
      # flips it, after signing + provenance succeed (fail-closed).
      - name: goreleaser release
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/repo -w /repo \
            -e GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            goreleaser/goreleaser@sha256:f5ce92e9a38fb9406ccd638b95e43402cd3f4c567cb677eb06af9fd161278c12 \
            release --clean

      # The goreleaser container runs as root (uid 0), so on a hosted Linux
      # runner the bind-mounted dist/ and every artifact it writes are owned
      # root:root. The native signing step below runs as the (non-root) runner
      # user and must CREATE .sig/.pem sidecars INSIDE dist/ — which fails with
      # permission denied against a root-owned directory, aborting the release
      # before it is ever published. Reclaim ownership for the runner user so the
      # native steps can write. (Docker Desktop on macOS remaps bind-mount
      # ownership, so this only surfaces on the real Linux runner.) The hosted
      # runner user has passwordless sudo.
      - name: Reclaim dist ownership from the goreleaser container
        run: sudo chown -R "$(id -u):$(id -g)" dist

      # Native runner step: install cosign. Pinned by SHA; the installer
      # verifies its own pinned cosign release download. No long-lived key.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      # Native runner step: keyless-sign every released file. cosign reads the
      # ambient ACTIONS_ID_TOKEN_REQUEST_URL/_TOKEN (present because id-token:
      # write is on this job), exchanges the GitHub OIDC token at Fulcio for a
      # short-lived cert bound to this workflow identity, and records the
      # signature in the Rekor transparency log. cosign v3 defaults sign-blob to
      # the new bundle format, which requires --bundle (the legacy split
      # --output-signature/--output-certificate is rejected under that default).
      # Emit one self-contained .cosign.bundle per file (signature + cert +
      # inclusion proof in one verifiable artifact) — the same convention the
      # broker release publishes. sign-blob (not sign) is correct: these are
      # blobs, not OCI images.
      - name: Sign release artifacts (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=( dist/*.tar.gz )
          sboms=( dist/*.sbom.json )
          # Fail LOUDLY on a coverage gap rather than nullglob-skipping it: the
          # build emits one archive per target (linux amd64+arm64) and one SBOM
          # per archive, so there must be a non-zero, equal count of each. If a
          # future goreleaser/syft default ever renamed the SBOM, sboms[] would
          # silently empty out here — this guard turns that into a hard failure
          # instead of a release whose SBOMs are unsigned.
          if [ ${#archives[@]} -eq 0 ]; then
            echo "::error::no release archives found in dist/ to sign"
            exit 1
          fi
          if [ ${#sboms[@]} -ne ${#archives[@]} ]; then
            echo "::error::SBOM/archive count mismatch: ${#sboms[@]} SBOMs vs ${#archives[@]} archives — SBOMs would go unsigned"
            exit 1
          fi
          files=( "${archives[@]}" "${sboms[@]}" dist/checksums.txt )
          for f in "${files[@]}"; do
            cosign sign-blob --yes \
              --bundle "${f}.cosign.bundle" \
              "${f}"
          done

      # Native runner step: SLSA build provenance over the released set. Uses
      # the SAME job OIDC to sign a provenance predicate via Fulcio/Rekor and
      # stores it as a first-party attestation bound to this repo + workflow.
      # subject-checksums points at goreleaser's sha256 checksums.txt, so every
      # listed file is attested in one statement; the subject digests then match
      # exactly what a consumer downloads. Consumer verify: gh attestation
      # verify <file> --owner Wide-Moat.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums.txt

      # Native runner step: attach the cosign bundles to the Release that
      # goreleaser created on this tag. goreleaser uploads only its own
      # artifacts; the .cosign.bundle files are produced after it runs. One
      # bundle per signed file (archives, SBOMs, checksums.txt).
      - name: Attach signatures to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          bundles=( dist/*.cosign.bundle )
          if [ ${#bundles[@]} -eq 0 ]; then
            echo "::error::no cosign bundles to upload"
            exit 1
          fi
          gh release upload "${GITHUB_REF_NAME}" "${bundles[@]}" --clobber

      # FINAL STEP — fail-closed publish. goreleaser created the release as a
      # draft; it becomes public ONLY here, after signing, provenance, and the
      # sidecar upload have all succeeded. set -euo pipefail plus this step's
      # position means any earlier signing/attestation failure aborts the job
      # before the release is ever made public: a release is never published
      # unsigned or unattested.
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release edit "${GITHUB_REF_NAME}" --draft=false
