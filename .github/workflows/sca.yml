#
# Software composition analysis (SCA). Trivy scans the filesystem for known
# vulnerabilities in dependencies; the job fails on CRITICAL severity.

name: sca

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy:
    name: trivy fs (CRITICAL blocks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run trivy filesystem scan
        uses: aquasecurity/trivy-action@dc5a429b52fcf669ce959baa2c2dd26090d2a6c4 # 0.32.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: false
