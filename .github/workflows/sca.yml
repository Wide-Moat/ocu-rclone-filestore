#
# Software composition analysis (SCA). Trivy scans the filesystem for known
# vulnerabilities in dependencies; the job fails on CRITICAL severity.

name: sca

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trivy:
    name: trivy fs (CRITICAL blocks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run trivy filesystem scan
        # Run trivy from its official image (pinned by digest) rather than the
        # action wrapper, whose install script fetches the binary from GitHub
        # release downloads and fails intermittently under rate limiting. The
        # image is pulled from a registry, avoiding that path. The job fails on
        # any CRITICAL finding (--exit-code 1), keeping this gate blocking.
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/aquasecurity/trivy@sha256:de90a656e79b175a294abe85cb8b99670fab83ebf339cccd163e6f584846809a \
            filesystem --scanners vuln --severity CRITICAL --exit-code 1 \
            --ignore-unfixed=false --no-progress /repo
