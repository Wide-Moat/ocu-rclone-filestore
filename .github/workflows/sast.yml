#
# Static analysis (SAST) via semgrep. The build fails on WARNING- and
# ERROR-severity findings. Uses the auto config plus the Go and security-audit
# rulesets, run from the pinned semgrep image.
#
# WARNING is deliberately included: the p/golang and p/security-audit packs emit
# their security findings (weak crypto, insecure TLS, SQL/command injection,
# hardcoded credentials, weak RNG) at WARNING severity, not ERROR. Filtering to
# ERROR alone dropped every one of them, so the gate ran, loaded the rules, found
# the issues, and blocked nothing — a real vulnerability passed the gate. Blocking
# on WARNING+ERROR restores the security coverage the chosen rulesets provide;
# INFO (low-signal/style) stays non-blocking.

name: sast

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.97.0
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run semgrep (WARNING+ERROR blocks)
        run: |
          semgrep scan \
            --config=auto \
            --config=p/golang \
            --config=p/security-audit \
            --severity=ERROR \
            --severity=WARNING \
            --error \
            --quiet
