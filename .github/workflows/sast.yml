#
# Static analysis (SAST) via semgrep. The build fails on ERROR-severity
# findings (semgrep's highest blocking tier). Uses the auto config plus the
# Go and security-audit rulesets, run from the pinned semgrep image.

name: sast

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.97.0
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run semgrep (ERROR blocks)
        run: |
          semgrep scan \
            --config=auto \
            --config=p/golang \
            --config=p/security-audit \
            --severity=ERROR \
            --error \
            --quiet
