#
# OpenSSF Scorecard supply-chain posture scan. Runs weekly and on pushes to
# the default branch; publishes results to the Security tab (code-scanning
# SARIF) and to the public OpenSSF API that backs the README badge. Entirely
# off the release path — it never touches the e2e gate.

name: scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: '27 4 * * 1'   # weekly, Monday 04:27 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security tab
      id-token: write          # publish signed results to the OpenSSF API (badge)
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # required for the public badge
          # The default GITHUB_TOKEN cannot read branch-protection rules, so the
          # Branch-Protection check errors out (scores -1) even though protection
          # is configured. A fine-grained PAT with administration:read, stored as
          # the SCORECARD_TOKEN secret, lets the check read the rules. The
          # fallback to github.token keeps the scan working when the secret is
          # absent (Branch-Protection simply stays unread until the PAT is set).
          repo_token: ${{ secrets.SCORECARD_TOKEN || github.token }}

      - name: Upload SARIF to the Security tab
        uses: github/codeql-action/upload-sarif@181d5eefc20863364f96762470ba6f862bdef56b # v3.29.2
        with:
          sarif_file: results.sarif
