#
# rclone config for the conformance-runner. One ocufs remote dialing the
# dedicated broker-conformance session socket FILE on the shared volume. The
# guest holds no credential (SEC-25): socket_path + filesystem_id are the only
# handles. This remote dials the broker DIRECTLY (no FUSE, no VFS cache), so the
# fstests write/read-back round-trips are broker-cold by construction — the read
# can only be served by the broker fileDownload path.
#
# socket_path is the per-filesystem socket FILE (<filesystem_id>.sock under the
# broker's -south-socket-dir /sock), not the directory. filesystem_id is the
# dedicated conformance scope fsconf. The conformance run roots itself under the
# broker's downloadable /e2e prefix (the remote is addressed as fsconf:e2e by the
# service env); the conformance test creates /e2e through the broker at bootstrap,
# and /e2e segment-matches every child under it so the suite's objects are
# cold-readable and cold-listable under SEC-73 without any broker change.
[fsconf]
type = ocufs
socket_path = /sock/fsconf.sock
filesystem_id = fsconf
read_only = false
