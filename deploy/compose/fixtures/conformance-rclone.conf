#
# Template marker only. The real conformance rclone config is RENDERED at
# bringup by the conformance-bootstrap step, which fills in the values that
# cannot be known ahead of time: the minted fsconf weak JWT (auth_token) and the
# CA PEM trust anchor (ca_cert_pem), both written through rclone's own config
# writer so the multi-line PEM is encoded in a form rclone re-reads exactly.
#
# The rendered remote is an ocufs remote dialing the edge over TLS with the new
# transport (service_url + auth_token + filesystem_id + ca_cert_pem), NOT a unix
# socket. The conformance run goes through the edge for full-path parity: the
# write/read-back round-trips traverse the validate -> exchange -> inject chain.
# The fsconf scope is a plain RW scope; the REST filestore serves all reads, so
# the old downloadable-prefix gymnastics are gone.
#
# The shape the bootstrap writes:
#
#   [fsconf]
#   type = ocufs
#   service_url = https://edge:8450
#   filesystem_id = fsconf
#   auth_token = <minted fsconf weak JWT>
#   ca_cert_pem = <CA PEM, multi-line>
#   read_only = false
