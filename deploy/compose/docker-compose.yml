#
# Network-topology compose harness for the real end-to-end exercise. The guest
# mount dials its HTTPS service_url OUTBOUND to the storage egress edge; the edge
# validates the weak session JWT, strips it, exchanges it for the real filestore
# credential keyed on filesystem_id, injects that credential, and routes to the
# REST filestore. The control-plane mints the weak JWTs and publishes the JWKS;
# the exchange peer performs the RFC-8693 trade.
#
# THE ENVOY-ONLY-HOP INVARIANT (load-bearing): two networks split the graph. The
# mount-facing network carries the mount, the test-runner, the conformance-runner
# and the edge; the edge-backend network carries the edge, the filestore, the
# control-plane and the exchange. The filestore (and control-plane and exchange)
# sit on edge-backend ONLY, so the guest container has no L3 route to them — the
# edge is the only reachable storage hop. This deliberately relaxes the old
# network_mode:none guarantee; confidentiality now rests on TLS-at-edge + the
# filestore's scope-validation (foreign-scope 403) + this single-hop property,
# which test/e2e/envoy_only_hop_test.go ASSERTS rather than assumes.
#
# Real /dev/fuse needs a Linux kernel; run this under Lima locally (see
# ../../docs/e2e-local.md). The guest holds no backend credential: the per-mount
# auth_token is a weak session JWT the control-plane mints; the real filestore
# credential never reaches the guest (it lives only between the edge and the
# filestore, post-exchange).

# Every peer/edge image builds from the one peer.Dockerfile, selecting its cmd
# main via the CMD_PKG build arg, so the layer cache is shared across services.
x-peer-build: &peer-build
  context: ../..
  dockerfile: deploy/compose/peer.Dockerfile

services:
  # ---------------------------------------------------------------------------
  # Bringup keystone: generate the CA + per-service leaf certs, the stable
  # control-plane signing key, the per-scope weak JWTs, and the rendered guest
  # config into the shared volume. Runs ONCE and exits; every other service
  # waits on its successful completion so the trust graph and the fixture exist
  # before any peer starts.
  # ---------------------------------------------------------------------------
  harness-init:
    build:
      <<: *peer-build
      args:
        CMD_PKG: ./test/harness/cmd/harness-init
    command:
      - -out
      - /shared
      - -edge-host
      - edge
      - -edge-port
      - "8450"
      - -fixture-template
      - /fixtures/guest-config.json
    volumes:
      - shared:/shared
      - ./fixtures/guest-config.json:/fixtures/guest-config.json:ro
    networks:
      - edge-backend

  # ---------------------------------------------------------------------------
  # Control-plane: mint + JWKS over TLS on :8443, edge-backend only. Signs with
  # the stable key harness-init generated so the fixture's weak JWTs verify
  # against the JWKS this process serves.
  # ---------------------------------------------------------------------------
  control-plane:
    build:
      <<: *peer-build
      args:
        CMD_PKG: ./test/harness/cmd/controlplane
    command:
      - -addr
      - ":8443"
      - -cert
      - /shared/control-plane.cert.pem
      - -key
      - /shared/control-plane.key.pem
      - -signing-key
      - /shared/control-plane.signing.key.pem
    depends_on:
      harness-init:
        condition: service_completed_successfully
    volumes:
      - shared:/shared:ro
    networks:
      - edge-backend

  # ---------------------------------------------------------------------------
  # Exchange: RFC-8693 token endpoint + credential JWKS over TLS on :8447,
  # edge-backend only. Validates the weak JWT against the control-plane JWKS and
  # issues the real filestore credential as a second JWT bound to the scope.
  # ---------------------------------------------------------------------------
  exchange:
    build:
      <<: *peer-build
      args:
        CMD_PKG: ./test/harness/cmd/exchange
    command:
      - -addr
      - ":8447"
      - -cert
      - /shared/exchange.cert.pem
      - -key
      - /shared/exchange.key.pem
      - -ca
      - /shared/ca.pem
      - -control-plane-jwks
      - https://control-plane:8443/.well-known/jwks.json
    depends_on:
      harness-init:
        condition: service_completed_successfully
      control-plane:
        condition: service_started
    volumes:
      - shared:/shared:ro
    networks:
      - edge-backend

  # ---------------------------------------------------------------------------
  # REST filestore: four local-volume scopes over TLS on :8444, edge-backend
  # ONLY (NOT mount-facing — the single-hop invariant). Validates the injected
  # post-exchange credential against the exchange's credential JWKS. The
  # fsthrottle scope carries the per-op token bucket (SC2). Objects are stored
  # FLAT under each scope root, so the broker-persistence assertions map the
  # mount-relative path 1:1.
  # ---------------------------------------------------------------------------
  filestore:
    build:
      <<: *peer-build
      args:
        CMD_PKG: ./test/harness/cmd/filestored
    command:
      - -addr
      - ":8444"
      - -cert
      - /shared/filestore.cert.pem
      - -key
      - /shared/filestore.key.pem
      - -ca
      - /shared/ca.pem
      - -credential-jwks
      - https://exchange:8447/credential-jwks
      - -root
      - /workspace
    depends_on:
      harness-init:
        condition: service_completed_successfully
      exchange:
        condition: service_started
    volumes:
      - shared:/shared:ro
      - filestore-workspace:/workspace
    networks:
      - edge-backend

  # ---------------------------------------------------------------------------
  # Live storage egress edge: validate -> strip -> keyed exchange -> inject ->
  # route, over TLS on :8450. On BOTH networks — the guest dials it inbound on
  # mount-facing, and it dials the peers on edge-backend. This dual membership
  # is what makes the edge the only hop.
  # ---------------------------------------------------------------------------
  edge:
    build:
      <<: *peer-build
      args:
        CMD_PKG: ./test/harness/cmd/edge
    command:
      - -addr
      - ":8450"
      - -cert
      - /shared/edge.cert.pem
      - -key
      - /shared/edge.key.pem
      - -ca
      - /shared/ca.pem
      - -control-plane-jwks
      - https://control-plane:8443/.well-known/jwks.json
      - -exchange-url
      - https://exchange:8447/token
      - -upstream-url
      - https://filestore:8444
    depends_on:
      harness-init:
        condition: service_completed_successfully
      control-plane:
        condition: service_started
      exchange:
        condition: service_started
      filestore:
        condition: service_started
    volumes:
      - shared:/shared:ro
    networks:
      - mount-facing
      - edge-backend

  # ---------------------------------------------------------------------------
  # The guest mount. Unlike the old graph it has a REAL network stack: it is on
  # the mount-facing network ONLY and dials its HTTPS service_url (the edge)
  # outbound. No edge-backend membership, so no direct route to the filestore.
  # FUSE needs the device node and the mount capability; the rshared bind
  # propagates the mounts out to the host path and into the runner.
  # ---------------------------------------------------------------------------
  mount:
    build:
      context: ../..
      dockerfile: Dockerfile
    depends_on:
      harness-init:
        condition: service_completed_successfully
      edge:
        condition: service_started
    devices:
      - /dev/fuse
    # Capabilities: start from zero and grant back only CAP_SYS_ADMIN, the one
    # capability the in-process FUSE mount(2)/umount2(2) path exercises. The
    # default container capability set (CHOWN, DAC_OVERRIDE, SETUID, ...) is
    # dropped. The container runs as root, so DAC checks on the root-owned
    # staging dirs and the VFS cache take the uid-0 fast path, not a capability.
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN
    security_opt:
      # Narrow AppArmor profile (NOT unconfined): permits only the fuse.* mount/
      # umount onto /mnt/user-data, /dev/fuse, the binary exec, and the runtime
      # writes (VFS cache under /root/.cache, ready-file under /run/ocu, mount
      # targets under /mnt/user-data); denies the rest. Load it into the host
      # kernel before `up`:
      #   sudo apparmor_parser -r -W deploy/compose/apparmor/ocu-mount.profile
      # (see docs/e2e-local.md). The profile name, not a path, is referenced.
      - apparmor=ocu-mount
      # Narrow seccomp: the runtime default allowlist with the broad
      # CAP_SYS_ADMIN-gated admin group removed and only {mount, umount2, clone,
      # clone3} added back unconditionally — sixteen admin syscalls the default
      # would unlock under CAP_SYS_ADMIN are now denied. clone/clone3 are the Go
      # runtime's OS-thread creation and cannot be removed.
      - seccomp=./seccomp/mount-fuse.json
      # Block privilege gain via execve (PR_SET_NO_NEW_PRIVS). The mount path
      # execs nothing and the static image carries no setuid/file-cap binary, so
      # this is hardening at zero functional cost; CAP_SYS_ADMIN is retained.
      - no-new-privileges:true
    # Read-only container root filesystem: the mount process writes nothing to
    # the image. The single writable tmpfs is the rclone VFS disk cache, which
    # the runtime (HOME=/root) resolves to /root/.cache; without it rclone
    # disables the cache and degrades the SEC-46 hold-data-across-throttle path.
    # The ready-file dir (/run/ocu) and the mount targets (/mnt/user-data) are a
    # named volume and a host bind respectively, already writable.
    read_only: true
    tmpfs:
      - /root/.cache
    # No host PID namespace: the mount runs in its OWN private PID namespace and
    # is PID 1 in this container, so it exposes no host process table of its own.
    # The graceful-teardown step still signals the REAL mount process: the
    # test-runner (the harness, NOT a mount-service privilege) joins the HOST PID
    # namespace and finds the mount by its host-side PID. Sharing the mount's own
    # namespace (pid: service:mount) is NOT usable for teardown — there the mount
    # is PID 1, and when the teardown SIGTERMs it the kernel SIGKILLs every other
    # process in that namespace (the runner included, exit 137) before the
    # post-teardown assertions can run. The runner's PID-ns choice is documented
    # on the test-runner service below.
    networks:
      - mount-facing
    volumes:
      # The rendered guest config from harness-init (service_url -> edge,
      # auth_token -> weak JWT, ca_cert_pem -> the CA the edge leaf chains to).
      - shared:/shared:ro
      - mount-shared:/run/ocu
      # The mount destinations are a host BIND with rshared propagation so the
      # FUSE mounts created INSIDE this container propagate out to the host path
      # and from there into the test-runner's rslave bind. The canonical mount
      # root is /mnt/user-data; create outputs/ uploads/ outputs2/ throttle/
      # under the host path before `up` (see docs/e2e-local.md).
      - type: bind
        source: /tmp/ocu-e2e-mountroot
        target: /mnt/user-data
        bind:
          propagation: rshared
    # The shipped entrypoint contract: --config (required), --ready-file. No
    # socket flags (removed in the HTTPS/REST pivot); the transport flows in the
    # config.
    command:
      - --config
      - /shared/guest-config.json
      - --ready-file
      - /run/ocu/mount-ready

  # ---------------------------------------------------------------------------
  # Test runner — the live e2e gate (profile "test"). Runs the gated exercise
  # against the FUSE mountpoints. On mount-facing ONLY (it drives FUSE and needs
  # no peer access). Mounts the filestore scope volume READ-ONLY for the
  # broker-persistence assertions; objects are stored flat under each scope root.
  # ---------------------------------------------------------------------------
  test-runner:
    profiles: ["test"]
    build:
      context: ../..
      dockerfile: deploy/compose/runner.Dockerfile
    depends_on:
      mount:
        condition: service_started
    # Host PID namespace (test-harness only — NOT a mount-service privilege): the
    # graceful-teardown step (10_sigterm_teardown) SIGTERMs the real mount
    # process and then MUST OUTLIVE that process's exit to finish its assertions
    # (poll the mountpoint, confirm the ready-file retracted). The mount runs in
    # its OWN private PID namespace, where it is PID 1; sharing that namespace
    # (pid: service:mount) makes the kernel SIGKILL the runner the instant the
    # mount (PID 1 there) exits, so the post-teardown assertions never run. The
    # host namespace lets the runner see the mount by its host-side PID
    # (pgrep -f '^/ocu-rclone-filestore') and survive its exit. This privilege is
    # the runner's alone; the mount service holds NO host PID namespace.
    pid: "host"
    networks:
      - mount-facing
    # The runner stays apparmor=unconfined: it must deliver a SIGTERM to the
    # mount process for the graceful-teardown step and read the broker workspace
    # volume. Its own attack surface is bounded (it runs only the e2e test binary
    # and never mounts), so narrowing it is out of scope for the mount-service
    # posture; the strict profile is on the mount service.
    security_opt:
      - apparmor=unconfined
    environment:
      RCLONE_OCUFS_LIVE: "1"
      OCU_E2E_RW_MOUNT: /mnt/user-data/outputs
      OCU_E2E_RO_MOUNT: /mnt/user-data/uploads
      OCU_E2E_READY_FILE: /run/ocu/mount-ready
      # A SECOND rw mount of the SAME scope (fsrw): its independent VFS cache is
      # cold, so a read there proves the broker fileDownload path (cold-read).
      OCU_E2E_RW_MOUNT2: /mnt/user-data/outputs2
      # The throttled scope (fsthrottle): a burst drives the filestore's per-op
      # bucket over budget; refused ops surface as EIO and recover on backoff.
      OCU_E2E_THROTTLE_MOUNT: /mnt/user-data/throttle
      # The filestore scope dirs, mounted read-only below. Objects are FLAT
      # under each scope root (no <fsid>/ nesting), so the mount-relative path
      # maps 1:1 — NO /fsrw suffix.
      OCU_E2E_BROKER_RW_WORKSPACE: /filestore-workspace/fsrw
      OCU_E2E_BROKER_THROTTLE_WORKSPACE: /filestore-workspace/fsthrottle
      # The Envoy-only-hop assertion targets: the edge-backend peers must be
      # UNREACHABLE from mount-facing, the edge REACHABLE.
      OCU_E2E_FILESTORE_ADDR: filestore:8444
      OCU_E2E_CONTROL_PLANE_ADDR: control-plane:8443
      OCU_E2E_EXCHANGE_ADDR: exchange:8447
      OCU_E2E_EDGE_ADDR: edge:8450
      OCU_E2E_ALLOW_PARTIAL: ${OCU_E2E_ALLOW_PARTIAL:-}
    volumes:
      - mount-shared:/run/ocu
      - type: bind
        source: /tmp/ocu-e2e-mountroot
        target: /mnt/user-data
        bind:
          propagation: rslave
      # The filestore engine-root workspace, READ-ONLY: the write/throttle steps
      # hash the bytes the filestore actually persisted to prove the upload
      # reached the backend, not just the local VFS cache.
      - filestore-workspace:/filestore-workspace:ro
    command:
      - sh
      - -c
      - |
        i=0
        while [ ! -f /run/ocu/mount-ready ]; do
          i=$$((i+1))
          if [ "$$i" -gt 120 ]; then
            echo "mount never became ready within 120s" >&2
            exit 1
          fi
          sleep 1
        done
        OCU_E2E_MOUNT_PID="$$(pgrep -f '^/ocu-rclone-filestore' | head -n1)"
        if [ -z "$$OCU_E2E_MOUNT_PID" ]; then
          echo "could not resolve the mount process in the shared PID namespace" >&2
          exit 1
        fi
        export OCU_E2E_MOUNT_PID
        /e2e.test -test.v -test.run '^TestEnvoyOnlyHop$$' -test.count=1 || exit 1
        # Mount runtime-posture (CapEff == CAP_SYS_ADMIN only, read-only image
        # rootfs EROFS, writable VFS-cache tmpfs) must run while the mount is
        # still live — TestE2EExercise SIGTERMs it in its teardown step — and
        # needs the resolved OCU_E2E_MOUNT_PID to read the mount process's
        # CapEff and probe its rootfs through /proc/<pid>/.
        /e2e.test -test.v -test.run '^TestMountRuntimePosture$$' -test.count=1 || exit 1
        exec /e2e.test -test.v -test.run '^TestE2EExercise$$' -test.count=1

  # ---------------------------------------------------------------------------
  # Conformance runner — the rclone standard backend suite (TestFstestsLiveBroker)
  # run THROUGH the edge for full-path parity (profile "test"). It renders its
  # ocufs remote at bringup via conformance-bootstrap (service_url + minted
  # fsconf weak JWT + CA PEM), then runs the suite. On mount-facing so it reaches
  # the edge; it never touches the FUSE mount (its own *Fs dials the edge), so
  # every write/read-back is broker-cold by construction.
  # ---------------------------------------------------------------------------
  conformance-runner:
    profiles: ["test"]
    build:
      context: ../..
      dockerfile: deploy/compose/conformance.Dockerfile
    depends_on:
      harness-init:
        condition: service_completed_successfully
      edge:
        condition: service_started
    networks:
      - mount-facing
    environment:
      # A remote NAME (fsconf) rooted under /e2e; the suite creates /e2e through
      # the edge at bootstrap and writes beneath it. Distinct from the exercise
      # runner's RCLONE_OCUFS_LIVE boolean. RCLONE_CONFIG is deliberately UNSET:
      # the remote is configured via RCLONE_CONFIG_FSCONF_* env overrides the
      # bootstrap emits (so the multi-line CA PEM survives — rclone's file parser
      # does not round-trip a bare multi-line value, but the env overrides do).
      OCU_FSTESTS_REMOTE: "fsconf:e2e"
    volumes:
      - shared:/shared:ro
    command:
      - sh
      - -c
      - |
        /conformance-bootstrap \
          -remote fsconf \
          -out /tmp/conformance-env.sh \
          -service-url https://edge:8450 \
          -filesystem-id fsconf \
          -ca /shared/ca.pem \
          -tokens /shared/weak-tokens.json
        . /tmp/conformance-env.sh
        exec /conformance.test -test.v -test.run '^TestFstestsLiveBroker$$' -test.count=1

networks:
  # The guest-facing network: the mount, the runners, and the edge. The
  # filestore and its backend peers are deliberately ABSENT here.
  mount-facing:
  # The backend network: the edge plus the filestore, control-plane, and
  # exchange. The guest never joins this network.
  edge-backend:

volumes:
  # Bringup artifacts (CA, leaf certs, signing key, weak tokens, rendered guest
  # config) the init step writes and the peers read.
  shared:
  # Ready-file handoff between the mount and the test runner.
  mount-shared:
  # The filestore engine root (all scopes live in subdirectories of it).
  filestore-workspace:
